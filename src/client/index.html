<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>adf-graph-ui</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Overpass+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <span class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">adf-graph</span>
      </span>
      <div class="toolbar-spacer"></div>
      <button id="layout-toggle" class="toolbar-btn" title="Toggle layout">TB</button>
      <button id="refresh-btn" class="toolbar-btn" title="Refresh graph">
        <svg class="refresh-icon" viewBox="0 0 16 16" width="14" height="14">
          <path d="M13.65 2.35A8 8 0 1 0 16 8h-2a6 6 0 1 1-1.76-4.24L10 6h6V0l-2.35 2.35z" fill="currentColor"/>
        </svg>
      </button>
    </header>
    <main>
      <nav id="navigator">
        <div class="nav-search-wrap">
          <input id="nav-search" type="text" placeholder="Filter pipelines..." spellcheck="false" autocomplete="off">
        </div>
        <div id="nav-list"></div>
      </nav>
      <div id="graph-container">
        <div id="breadcrumb"></div>
        <div id="graph-empty">
          <div class="empty-hex">⬡</div>
          <p>Select a pipeline to explore</p>
        </div>
        <div id="graph-legend"></div>
      </div>
      <aside id="inspector" class="collapsed"></aside>
    </main>
    <footer id="status-bar">
      <span id="stats"></span>
      <span class="status-sep">·</span>
      <span id="environment"></span>
      <span class="toolbar-spacer"></span>
      <span id="connection-status" class="connected">● Connected</span>
    </footer>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
